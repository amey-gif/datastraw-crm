<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Ticket | Datastraw CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">Datastraw CRM</h1>
    <a href="/" class="text-sm text-blue-600 hover:underline">← Back to Tickets</a>
  </nav>

  <!-- Form -->
  <div class="max-w-2xl mx-auto mt-10 px-4">
    <div class="bg-white rounded shadow p-8">

      <h2 class="text-xl font-semibold text-gray-800 mb-1">Create New Ticket</h2>
      <p class="text-sm text-gray-500 mb-6">Fill in the customer details and issue information</p>

      <!-- Success message (hidden by default) -->
      <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded mb-6 text-sm">
        ✅ Ticket created successfully! Redirecting...
      </div>

      <!-- Error message (hidden by default) -->
      <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-6 text-sm">
      </div>

      <!-- Customer Name -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Customer Name <span class="text-red-500">*</span>
        </label>
        <input
          id="customerName"
          type="text"
          placeholder="e.g. Rahul Sharma"
          class="w-full border border-gray-300 rounded px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Customer Email -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Customer Email <span class="text-red-500">*</span>
        </label>
        <input
          id="customerEmail"
          type="email"
          placeholder="e.g. rahul@gmail.com"
          class="w-full border border-gray-300 rounded px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Subject -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Issue Subject <span class="text-red-500">*</span>
        </label>
        <input
          id="subject"
          type="text"
          placeholder="e.g. Wrong item delivered"
          class="w-full border border-gray-300 rounded px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Description -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Issue Description <span class="text-red-500">*</span>
        </label>
        <textarea
          id="description"
          rows="4"
          placeholder="Describe the issue in detail..."
          class="w-full border border-gray-300 rounded px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"
        ></textarea>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3">
        <button
          onclick="submitTicket()"
          id="submitBtn"
          class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 text-sm font-medium"
        >
          Create Ticket
        </button>
        
          href="/"
          class="bg-gray-100 text-gray-700 px-6 py-2 rounded hover:bg-gray-200 text-sm font-medium"
        >
          Cancel
        </a>
      </div>

    </div>
  </div>

  <script>
    async function submitTicket() {
      // Get values
      const customer_name = document.getElementById("customerName").value.trim();
      const customer_email = document.getElementById("customerEmail").value.trim();
      const subject = document.getElementById("subject").value.trim();
      const description = document.getElementById("description").value.trim();

      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");
      const submitBtn = document.getElementById("submitBtn");

      // Reset messages
      errorMsg.classList.add("hidden");
      successMsg.classList.add("hidden");

      // Basic validation
      if (!customer_name || !customer_email || !subject || !description) {
        errorMsg.textContent = "❌ All fields are required.";
        errorMsg.classList.remove("hidden");
        return;
      }

      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(customer_email)) {
        errorMsg.textContent = "❌ Please enter a valid email address.";
        errorMsg.classList.remove("hidden");
        return;
      }

      // Disable button while submitting
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating...";

      try {
        const response = await fetch("/api/tickets", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ customer_name, customer_email, subject, description })
        });

        const data = await response.json();

        if (response.ok) {
          successMsg.classList.remove("hidden");
          // Redirect to home after 1.5 seconds
          setTimeout(() => window.location.href = "/", 1500);
        } else {
          errorMsg.textContent = "❌ Error: " + (data.detail || "Something went wrong.");
          errorMsg.classList.remove("hidden");
          submitBtn.disabled = false;
          submitBtn.textContent = "Create Ticket";
        }

      } catch (err) {
        errorMsg.textContent = "❌ Network error. Please try again.";
        errorMsg.classList.remove("hidden");
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Ticket";
      }
    }
  </script>

</body>
</html>
