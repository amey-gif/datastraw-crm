<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Detail | Datastraw CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">Datastraw CRM</h1>
    <a href="/" class="text-sm text-blue-600 hover:underline">← Back to Tickets</a>
  </nav>

  <!-- Main Content -->
  <div class="max-w-3xl mx-auto mt-10 px-4 pb-16">

    <!-- Loading state -->
    <div id="loadingState" class="text-center py-20 text-gray-400">
      <p>Loading ticket...</p>
    </div>

    <!-- Error state -->
    <div id="errorState" class="hidden text-center py-20 text-red-400">
      <p class="text-lg">Ticket not found</p>
      <a href="/" class="text-blue-600 text-sm hover:underline mt-2 block">← Back to home</a>
    </div>

    <!-- Ticket Detail -->
    <div id="ticketDetail" class="hidden">

      <!-- Header -->
      <div class="bg-white rounded shadow p-6 mb-6">
        <div class="flex justify-between items-start flex-wrap gap-4">
          <div>
            <p id="ticketIdLabel" class="text-blue-600 font-mono font-semibold text-lg"></p>
            <h2 id="ticketSubject" class="text-xl font-bold text-gray-800 mt-1"></h2>
          </div>
          <span id="statusBadge" class="px-3 py-1 rounded-full text-sm font-medium"></span>
        </div>

        <!-- Customer Info -->
        <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <p class="text-xs text-gray-500 uppercase font-medium">Customer Name</p>
            <p id="customerName" class="text-gray-800 mt-1"></p>
          </div>
          <div>
            <p class="text-xs text-gray-500 uppercase font-medium">Customer Email</p>
            <p id="customerEmail" class="text-gray-800 mt-1"></p>
          </div>
          <div>
            <p class="text-xs text-gray-500 uppercase font-medium">Created At</p>
            <p id="createdAt" class="text-gray-800 mt-1"></p>
          </div>
          <div>
            <p class="text-xs text-gray-500 uppercase font-medium">Last Updated</p>
            <p id="updatedAt" class="text-gray-800 mt-1"></p>
          </div>
        </div>

        <!-- Description -->
        <div class="mt-6">
          <p class="text-xs text-gray-500 uppercase font-medium">Issue Description</p>
          <p id="ticketDescription" class="text-gray-800 mt-2 leading-relaxed"></p>
        </div>
      </div>

      <!-- Update Status -->
      <div class="bg-white rounded shadow p-6 mb-6">
        <h3 class="text-base font-semibold text-gray-800 mb-4">Update Ticket</h3>

        <!-- Success/Error messages -->
        <div id="updateSuccess" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded mb-4 text-sm">
          ✅ Ticket updated successfully!
        </div>
        <div id="updateError" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">
        </div>

        <!-- Status dropdown -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Change Status</label>
          <select
            id="statusSelect"
            class="w-full md:w-64 border border-gray-300 rounded px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Closed">Closed</option>
          </select>
        </div>

        <!-- Add note -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Add Note</label>
          <textarea
            id="noteInput"
            rows="3"
            placeholder="e.g. Refund initiated, replacement shipped..."
            class="w-full border border-gray-300 rounded px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"
          ></textarea>
        </div>

        <button
          onclick="updateTicket()"
          id="updateBtn"
          class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 text-sm font-medium"
        >
          Update Ticket
        </button>
      </div>

      <!-- Notes History -->
      <div class="bg-white rounded shadow p-6">
        <h3 class="text-base font-semibold text-gray-800 mb-4">Notes History</h3>
        <div id="notesList">
          <!-- Notes loaded here -->
        </div>
        <div id="noNotes" class="text-sm text-gray-400">No notes yet.</div>
      </div>

    </div>
  </div>

  <script>
    // Get ticket ID from URL ?id=TKT-001
    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get("id");

    // Status badge colors
    function getStatusColor(status) {
      const colors = {
        "Open": "bg-red-100 text-red-700",
        "In Progress": "bg-yellow-100 text-yellow-700",
        "Closed": "bg-green-100 text-green-700"
      };
      return colors[status] || "bg-gray-100 text-gray-600";
    }

    // Format date
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    // Load ticket details
    async function loadTicket() {
      if (!ticketId) {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("errorState").classList.remove("hidden");
        return;
      }

      try {
        const response = await fetch(`/api/tickets/${ticketId}`);

        if (!response.ok) {
          document.getElementById("loadingState").classList.add("hidden");
          document.getElementById("errorState").classList.remove("hidden");
          return;
        }

        const ticket = await response.json();

        // Hide loading, show detail
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("ticketDetail").classList.remove("hidden");

        // Fill in ticket data
        document.getElementById("ticketIdLabel").textContent = ticket.ticket_id;
        document.getElementById("ticketSubject").textContent = ticket.subject;
        document.getElementById("customerName").textContent = ticket.customer_name;
        document.getElementById("customerEmail").textContent = ticket.customer_email;
        document.getElementById("createdAt").textContent = formatDate(ticket.created_at);
        document.getElementById("updatedAt").textContent = formatDate(ticket.updated_at);
        document.getElementById("ticketDescription").textContent = ticket.description;

        // Status badge
        const badge = document.getElementById("statusBadge");
        badge.textContent = ticket.status;
        badge.className = `px-3 py-1 rounded-full text-sm font-medium ${getStatusColor(ticket.status)}`;

        // Set current status in dropdown
        document.getElementById("statusSelect").value = ticket.status;

        // Load notes
        renderNotes(ticket.notes);

      } catch (err) {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("errorState").classList.remove("hidden");
      }
    }

    // Render notes list
    function renderNotes(notes) {
      const notesList = document.getElementById("notesList");
      const noNotes = document.getElementById("noNotes");

      if (!notes || notes.length === 0) {
        noNotes.classList.remove("hidden");
        notesList.innerHTML = "";
        return;
      }

      noNotes.classList.add("hidden");
      notesList.innerHTML = notes.map(note => `
        <div class="border-l-4 border-blue-400 pl-4 mb-4">
          <p class="text-sm text-gray-800">${note.note_text}</p>
          <p class="text-xs text-gray-400 mt-1">${formatDate(note.created_at)}</p>
        </div>
      `).join("");
    }

    // Update ticket
    async function updateTicket() {
      const status = document.getElementById("statusSelect").value;
      const note_text = document.getElementById("noteInput").value.trim();
      const updateBtn = document.getElementById("updateBtn");
      const successMsg = document.getElementById("updateSuccess");
      const errorMsg = document.getElementById("updateError");

      // Reset messages
      successMsg.classList.add("hidden");
      errorMsg.classList.add("hidden");

      // Disable button
      updateBtn.disabled = true;
      updateBtn.textContent = "Updating...";

      try {
        const response = await fetch(`/api/tickets/${ticketId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status, note_text: note_text || null })
        });

        const data = await response.json();

        if (response.ok) {
          successMsg.classList.remove("hidden");
          document.getElementById("noteInput").value = "";
          // Reload ticket to show updated data
          setTimeout(() => {
            successMsg.classList.add("hidden");
            loadTicket();
          }, 1500);
        } else {
          errorMsg.textContent = "❌ " + (data.detail || "Update failed.");
          errorMsg.classList.remove("hidden");
        }

      } catch (err) {
        errorMsg.textContent = "❌ Network error. Please try again.";
        errorMsg.classList.remove("hidden");
      } finally {
        updateBtn.disabled = false;
        updateBtn.textContent = "Update Ticket";
      }
    }

    // Load on page open
    loadTicket();
  </script>

</body>
</html>
